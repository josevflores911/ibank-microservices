server:
  port: 8084



springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

ibank:
  transacoes:
    clients:
      contas:
        url: 'http://localhost:8082/contas'
      clientes:
        url: 'http://localhost:8081/clientes'
      investimentos:
        url: 'http://localhost:8083/investimentos'
  config:
    kafka:
      server-url: 'http://localhost:29092'
      topics:
        transacao-notificacao: 'ibank.transacao-notificacao'
        logs: 'ibank.logs'
